<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <style>
      .navy { fill: #0B1F65; }
      .black { fill: #000000; }
      .title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 21px; font-weight: 800; letter-spacing: 5.5px; }
      .subtitle { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 11px; font-weight: 300; letter-spacing: 3.5px; }
    </style>
  </defs>

  <g transform="translate(0, -15)">
    <!-- P Stem and Serifs -->
    <path class="navy" d="M 115 140 h 60 v 5 h -20 v 130 h 25 v 5 h -65 v -5 h 20 v -130 h -20 z" />
    
    <!-- P Bowl -->
    <path class="navy" d="M 155 140 h 40 c 35 0 55 15 55 45 c 0 30 -20 45 -55 45 h -40 v -90 z M 155 150 v 70 h 30 c 20 0 30 -10 30 -35 c 0 -25 -10 -35 -30 -35 z" />

    <!-- L Stem and Left Serif -->
    <path class="navy" d="M 165 115 h 60 v 5 h -20 v 155 h -35 v -5 h 15 v -150 h -20 z" />
    
    <!-- L Sweeping Tail -->
    <path class="navy" d="M 205 265 h 40 c 40 0 65 -15 80 -60 c -10 48 -40 70 -80 70 h -40 z" />
  </g>

  <!-- Text -->
  <text x="200" y="310" class="title" text-anchor="middle">PATEL LEGAL SERVICES</text>
  <text x="200" y="335" class="subtitle" text-anchor="middle">PROFESSIONAL CORPORATION</text>
</svg>
